name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      DATA_GO_KR_SERVICE_KEY: ${{ secrets.DATA_GO_KR_SERVICE_KEY }}
      PUBLIC_DATA_SMOKE_HOUSING_TYPES: apartment,rowhouse,single_multi,officetel

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Check whitespace diffs
        run: |
          git diff --check
          git diff --cached --check
          git diff-tree --check --root --no-commit-id -r HEAD

      - name: Scan for committed secrets
        run: npm run scan:secrets

      - name: Test
        run: npm test

      - name: Validate PlayMCP readiness
        run: npm run validate:playmcp

      - name: Smoke local MCP HTTP server
        run: npm run smoke:http

      - name: Smoke MCP rate limit
        run: npm run smoke:rate-limit

      - name: Audit production dependencies
        run: npm audit --omit=dev

      - name: Build Docker image
        run: |
          for attempt in 1 2 3; do
            if docker build -t lease-safe-mcp-ci .; then
              exit 0
            fi
            echo "Docker build attempt ${attempt} failed; retrying after transient registry/network error..."
            sleep $((attempt * 10))
          done
          exit 1

      - name: Smoke Docker runtime
        run: npm run smoke:docker
        env:
          DOCKER_SMOKE_IMAGE: lease-safe-mcp-ci

      - name: Live public-data smoke
        if: ${{ env.DATA_GO_KR_SERVICE_KEY != '' }}
        shell: bash
        run: |
          set -o pipefail
          npm run smoke:public-data | tee live-public-data-smoke.log
        env:
          REQUIRE_LIVE_PUBLIC_DATA: "1"

      - name: Publish live public-data status
        if: ${{ always() }}
        shell: bash
        run: |
          evidence_status=0
          {
            echo "## Lease Safe CI Evidence"
            echo ""
            echo "- Commit: \`${GITHUB_SHA}\`"
            if [ -n "${DATA_GO_KR_SERVICE_KEY}" ]; then
              echo "- Live public-data smoke: executed in registration coverage mode"
            else
              echo "- Live public-data smoke: skipped because DATA_GO_KR_SERVICE_KEY is not configured"
              echo "- Registration evidence still requires the manual Registration Preflight workflow to pass"
            fi
            echo "- Required housing coverage: ${PUBLIC_DATA_SMOKE_HOUSING_TYPES}"
            echo "- Whitespace diff checks: working tree, staged diff, and submitted commit executed"
            echo "- Root route minimality smoke: executed in local HTTP and Docker runtime smoke"
            echo "- MCP request-id smoke: executed in local HTTP and Docker runtime smoke"
            echo "- Docker runtime smoke: executed"
            echo "- Docker non-root runtime check: executed"
            echo "- Dependency lifecycle scripts: disabled during npm ci"
            echo ""
            echo "### Live Public-Data Evidence Lines"
            echo ""
            if [ -f live-public-data-smoke.log ]; then
              echo '```text'
              if node dist/scripts/live-evidence.js live-public-data-smoke.log > live-public-data-evidence.log 2> live-public-data-evidence-error.log; then
                cat live-public-data-evidence.log
              else
                cat live-public-data-evidence-error.log
                evidence_status=1
              fi
              echo '```'
            else
              echo "Live public-data evidence lines were not collected in this CI run."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "$evidence_status" -ne 0 ]; then
            echo "Live public-data evidence lines were missing from captured smoke output." >&2
            exit "$evidence_status"
          fi
